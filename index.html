function checkCollision(x,z){

Math.abs(x-c.x)<c.w/2+0.5 &&
Math.abs(z-c.z)<c.d/2+0.5

return true;

}

}

return false;

function updateParty(){

    const playerMember = party.find(p=>p.player);
    playerMember.x = player.x;
    playerMember.z = player.z;

    // ===== Leader đi theo đường rừng =====

    if(!leader.path){

leader.path = [
    {x:0, z:9},
    {x:0, z:-10},
    {x:0, z:-35},
    {x:0, z:-60},
    {x:0, z:-90},
    {x:0, z:-130},
    {x:0, z:-180},
    {x:0, z:-230},
    {x:0, z:-280},
    {x:0, z:-330},
    {x:0, z:-345}
];

        leader.pathIndex=0;
    }

    const targetPoint=leader.path[leader.pathIndex];

    let dx=targetPoint.x-leader.x;
    let dz=targetPoint.z-leader.z;
    let dist=Math.hypot(dx,dz);

    if(dist<1){

        if(leader.pathIndex<leader.path.length-1)
            leader.pathIndex++;

    }else{

        let nx=leader.x+dx/dist*0.05;
        let nz=leader.z+dz/dist*0.05;

        if(!checkCollision(nx,nz)){
            leader.x=nx;
            leader.z=nz;
        }

    }

    leader.mesh.position.set(
        leader.x,
        0,
        leader.z
    );

// ===== PARTY ĐÁNH EVELYN =====

if(boss && boss.alive){

for(const p of party){

    if(!p.alive || p.player) continue;


    let dist = Math.hypot(
        boss.x - p.x,
        boss.z - p.z
    );


    // chạy tới gần boss

    if(dist > 2.5){

        let dx = boss.x - p.x;
        let dz = boss.z - p.z;

        p.x += dx/dist * 0.06;
        p.z += dz/dist * 0.06;

    }
    else{

        boss.hp -= p.atk * 0.05;


        createEffect(
            boss.x,
            boss.z,
            0xffff55,
            0.3,
            10
        );


        msgDiv.innerText =
        p.name+" attacks Evelyn!";

    }


    p.mesh.position.set(
        p.x,
        0,
        p.z
    );

}

}

    // ===== NPC =====

    for(const p of party){

        if(!p.alive) continue;
        if(p.player) continue;
        if(p.role==="Leader") continue;

        // tìm enemy gần nhất
        let nearest=null;
        let best=9999;

        for(const e of enemies){

            if(!e.alive) continue;

            let d=Math.hypot(
                e.x-p.x,
                e.z-p.z
            );

            if(d<best){

                best=d;
                nearest=e;

            }

        }

        // Có enemy -> tản ra đánh
        if(nearest && best<8){

            let ex=nearest.x-p.x;
            let ez=nearest.z-p.z;
            let ed=Math.hypot(ex,ez);

            if(ed>0.1){

                let nx=p.x+ex/ed*0.06;
                let nz=p.z+ez/ed*0.06;

                if(!checkCollision(nx,nz)){
                    p.x=nx;
                    p.z=nz;
                }

            }

            if(ed<2){

                nearest.hp-=p.atk*0.05;

                createEffect(
                    nearest.x,
                    nearest.z,
                    0xffdd55,
                    0.25,
                    8
                );

                if(nearest.hp<=0){

                    nearest.alive=false;
                    scene.remove(nearest.mesh);

                }

            }

        }else{

            // đội hình theo leader
            let ox=0;
            let oz=3;

            switch(p.role){

                case "Guide":
                    ox=-2;
                    oz=2;
                break;

                case "Archer":
                    ox=2;
                    oz=2;
                break;

                case "Mage":
                    ox=0;
                    oz=4;
                break;

            }

            let tx=leader.x+ox;
            let tz=leader.z+oz;

            let fx=tx-p.x;
            let fz=tz-p.z;
            let fd=Math.hypot(fx,fz);

            if(fd>0.25){

                let nx=p.x+fx/fd*0.05;
                let nz=p.z+fz/fd*0.05;

                if(!checkCollision(nx,nz)){
                    p.x=nx;
                    p.z=nz;
                }

            }

        }

        p.mesh.position.set(
            p.x,
            0,
            p.z
        );

    }

}

const effects=[];

function createEffect(x,z,color,size,life){

    const mesh=new THREE.Mesh(

            color,
            transparent:true
        })
    );

    mesh.position.set(x,1,z);

    scene.add(mesh);

    effects.push({

function updateMasterDaun(){

if(!masterDaun.appeared){

    const partyHurt = party.some(
        p=>!p.player && p.hp<p.maxHp
    );

    if(player.hp<=player.maxHp*0.5 && partyHurt){

        masterDaun.appeared=true;
        masterDaun.active=true;
        masterDaun.timer=180;

        masterDaun.x=player.x+2;
        masterDaun.z=player.z;

        masterDaun.mesh.position.set(
            masterDaun.x,
            0,
            masterDaun.z
        );

        msgDiv.innerText="Master Daun joins the battle!";
    }

}

    if(!masterDaun.active) return;

    masterDaun.timer--;

    for(const e of enemies){

        if(!e.alive) continue;

        const dx=e.x-masterDaun.x;
        const dz=e.z-masterDaun.z;
        const dist=Math.hypot(dx,dz);

        if(dist<6){

            e.hp-=4;

            e.x+=dx/dist*0.5;
            e.z+=dz/dist*0.5;

            createEffect(
                e.x,
                e.z,
                0xffffff,
                0.5,
                15
            );

            if(e.hp<=0){
                e.alive=false;
                scene.remove(e.mesh);
            }
        }
    }

    if(boss&&boss.alive){

        const dx=boss.x-masterDaun.x;
        const dz=boss.z-masterDaun.z;
        const dist=Math.hypot(dx,dz);

        if(dist<7){

            boss.hp-=5;

            boss.x+=dx/dist*0.6;
            boss.z+=dz/dist*0.6;
        }
    }

if(secretBoss && secretBoss.alive){

    const dx = secretBoss.x - masterDaun.x;
    const dz = secretBoss.z - masterDaun.z;
    const dist = Math.hypot(dx,dz);

    if(dist < 7){

        secretBoss.hp -= 5;

        secretBoss.x += dx/dist * 0.6;
        secretBoss.z += dz/dist * 0.6;

        createEffect(
            secretBoss.x,
            secretBoss.z,
            0xffffff,
            0.5,
            15
        );

        if(secretBoss.hp <= 0){

            secretBoss.alive = false;
            scene.remove(secretBoss.mesh);

            msgDiv.innerText =
            "Master Daun defeated Azrath.";

        }
    }
}

if(masterDaun.timer<=0 || masterDaun.hp<=0){

    masterDaun.active=false;

    scene.remove(masterDaun.mesh);

    msgDiv.innerText="Master Daun disappears.";

}

}

function updatePartyCombat(){

    for(const p of party){

        if(p.skillCd===undefined)
            p.skillCd=0;


        if(p.skillCd>0)
            p.skillCd--;



        // ================= SKILL PARTY =================

        if(p.skillCd<=0){

            if(boss && boss.alive){

                let bd=Math.hypot(
                    boss.x-p.x,
                    boss.z-p.z
                );

            }

                for(const e of enemies){

                    let d=Math.hypot(

                    );

                        target=e;

            }

        .filter(a =>

            a.hp < a.maxHp &&
            Math.hypot(
                a.x - p.x,
                a.z - p.z
            ) <= 10
        )
        .sort((a,b)=>
            (a.hp/a.maxHp) -
            (b.hp/b.maxHp)
        )[0];

    if(ally){

            ally.maxHp,

            ally.x,
            ally.z,
            0xffffaa,
            0.8,
            25
        );

        msgDiv.innerText =
            p.name + " uses Prayer!";

        p.skillCd = skill.cooldown;
        continue;
    }
}
            if(target){

if(skill.damage){

    target.hp-=skill.damage;

// Luna - Piercing Shot (mũi tên xuyên thấu)
if(p.id==="archer"){

    const dirX = target.x - p.x;
    const dirZ = target.z - p.z;

    const length = Math.hypot(dirX,dirZ);

    const nx = dirX / length;
    const nz = dirZ / length;


    // tất cả enemy nằm trên đường tên bay
    for(const e of enemies){

        if(!e.alive || e===target) continue;


        const vx = e.x - p.x;
        const vz = e.z - p.z;


        // khoảng cách theo hướng bắn
        const forward =
        vx * nx +
        vz * nz;


        // enemy ở phía trước
        if(forward > 0 && forward < 12){

            // khoảng lệch ngang so với đường tên
            const side =
            Math.abs(
                vx*nz -
                vz*nx
            );


            // bán kính thân mũi tên
            if(side < 0.8){

                e.hp -= skill.damage * 0.6;


                createEffect(
                    e.x,
                    e.z,
                    0x88ffff,
                    0.25,
                    10
                );


                if(e.hp<=0){

                    e.alive=false;
                    scene.remove(e.mesh);

                }

            }

        }

    }


    // Boss cũng bị xuyên nếu đứng trên đường tên
    if(boss && boss.alive){

        const vx=boss.x-p.x;
        const vz=boss.z-p.z;

        const forward =
        vx*nx + vz*nz;


        const side =
        Math.abs(
            vx*nz -
            vz*nx
        );


        if(
            forward>0 &&
            forward<12 &&
            side<1
        ){

            boss.hp -= skill.damage*0.6;

        }

    }


    // hiệu ứng đường tên
    createEffect(
        p.x + nx*6,
        p.z + nz*6,
        0x66ffff,
        0.35,
        15
    );

}

if(p.id==="mage"){

    if(target.blindTimer===undefined)
        target.blindTimer=0;

    target.blindTimer=180;

    target.vision=6;

    createEffect(
        target.x,
        target.z,
        0x6622aa,
        0.7,
        20
    );

}

    createEffect(
        target.x,
        target.z,
        0xffdd55,
        0.7,
        20
    );

                        msgDiv.innerText =
                        p.name+
                        " uses "+
                        skill.name+
                        "!";

}


                p.skillCd =
                skill.cooldown;


            }

        }



        // ================= ĐÁNH THƯỜNG EVELYN =================

        if(boss && boss.alive){

            let dist=Math.hypot(
                boss.x-p.x,
                boss.z-p.z
            );


            if(dist<3){

                boss.hp -= p.atk*0.05;


                createEffect(
                    boss.x,
                    boss.z,
                    0xffff66,
                    0.25,
                    10
                );

            }

        }



        // ================= ĐÁNH THƯỜNG ENEMY =================

        for(const e of enemies){

            if(!e.alive) continue;


            let dist=Math.hypot(
                e.x-p.x,
                e.z-p.z
            );


            if(dist<3){

                e.hp -= p.atk*0.05;


                createEffect(
                    e.x,
                    e.z,
                    0xffaa55,
                    0.25,
                    10
                );


                if(e.hp<=0){

                    e.alive=false;

                    scene.remove(e.mesh);

                }

            }

        }


    }



    // ================= CHECK BOSS DIE =================

    if(boss && boss.hp<=0){

        boss.alive=false;

        scene.remove(boss.mesh);


        gameState="victory";


        msgDiv.innerText =
        "VICTORY! Evelyn defeated.";


        alert(
            "VICTORY!"
        );


        location.reload();

    }

}

function damageParty(){

for(const p of party){

if(!p.alive) continue;


let enemiesNear =
enemies.some(e=>
e.alive &&
Math.hypot(
p.x-e.x,
p.z-e.z
)<2
);


if(enemiesNear){

p.hp-=0.2;

}


if(p.hp<=0){

p.hp=0;
p.alive=false;

scene.remove(p.mesh);
createCorpse(p.x,p.z);

msgDiv.innerText=
p.name+" died!";

}

}

}

function bind(btn,key){

    btn.ontouchstart=()=>{
        input[key]=true;
    };

    btn.ontouchend=()=>{
        input[key]=false;
    };

    btn.onmousedown=()=>{
        input[key]=true;
    };

    btn.onmouseup=()=>{
        input[key]=false;
    };

}

bind(document.getElementById("up"),"up");
bind(document.getElementById("down"),"down");
bind(document.getElementById("left"),"left");
bind(document.getElementById("right"),"right");

// ================= BUTTON ACTIONS =================

attackBtn.onclick = ()=>{

    if(player.attackCd>0) return;

    player.attackCd = 30;

    let hit = false;

    for(const e of enemies){

        if(!e.alive) continue;

        const dist = Math.hypot(
            player.x-e.x,
            player.z-e.z
        );

        if(dist<3){

            e.hp -= 20;

            createEffect(
                e.x,
                e.z,
                0xffaa00,
                0.35,
                15
            );

            if(e.hp<=0){
                e.alive=false;
                scene.remove(e.mesh);
            }

            hit=true;
        }
    }

    if(boss && boss.alive){

        const dist=Math.hypot(
            player.x-boss.x,
            player.z-boss.z
        );

        if(dist<3){

            boss.hp-=20;

            createEffect(
                boss.x,
                boss.z,
                0xffaa00,
                0.45,
                20
            );

            hit=true;
        }
    }

if(secretBoss && secretBoss.alive){

    const dist = Math.hypot(
        player.x - secretBoss.x,
        player.z - secretBoss.z
    );

    if(dist < 3){

        secretBoss.hp -= 20;

        createEffect(
            secretBoss.x,
            secretBoss.z,
            0xffaa00,
            0.45,
            20
        );

        hit = true;
    }
}

    msgDiv.innerText = hit ?
        "Sword Slash!" :
        "Attack missed.";

};

dodgeBtn.onclick = ()=>{

    if(player.dodgeCd>0) return;

    player.dodgeCd=240;

    const backDistance=3;

    const nx=player.x-Math.sin(player.rot)*backDistance;
    const nz=player.z+Math.cos(player.rot)*backDistance;

    if(!checkCollision(nx,nz)){
        player.x=nx;
        player.z=nz;
    }

    createEffect(
        player.x,
        player.z,
        0x66ccff,
        0.8,
        20
    );

    msgDiv.innerText="Quick Dodge!";
};

skillBtn.onclick = ()=>{

    if(player.skillCd>0) return;

    player.skillCd=300;

    castMagic(
        player,
        "Focus Step"
    );

};

function damagePlayer(dmg){

    // Trừ overhealth trước
    if(player.overHp > 0){

        let absorbed = Math.min(
            player.overHp,
            dmg
        );

        player.overHp -= absorbed;
        dmg -= absorbed;

        createEffect(
            player.x,
            player.z,
            0x66ccff,
            0.5,
            15
        );
    }


    // còn sát thương thì trừ HP thật
    if(dmg > 0){

        player.hp -= dmg;

        createEffect(
            player.x,
            player.z,
            0xff0000,
            0.7,
            20
        );

    }


    if(player.hp < 0)
        player.hp = 0;


    if(player.overHp < 0)
        player.overHp = 0;


    // đồng bộ party player
    const pm = party.find(p=>p.player);

    if(pm){

        pm.hp = player.hp;
        pm.overHp = player.overHp;

    }

}

function gameLoop(){

if(player.hp<=0){

gameState="gameover";

msgDiv.innerText=
"GAME OVER";

alert(
"GAME OVER"
);

location.reload();

return;

}

if(gameState!=="playing"){

renderer.render(scene,camera);

return;

}

if(input.up){

let nx =
player.x +
Math.sin(player.rot)*player.speed;

let nz =
player.z -
Math.cos(player.rot)*player.speed;


if(!checkCollision(nx,nz)){

    player.x=nx;
    player.z=nz;

}else{

    if(!checkCollision(nx,player.z))
        player.x=nx;

    if(!checkCollision(player.x,nz))
        player.z=nz;

}

}

if(input.down){

let nx =
player.x -
Math.sin(player.rot)*player.speed;

let nz =
player.z +
Math.cos(player.rot)*player.speed;


if(!checkCollision(nx,nz)){

    player.x=nx;
    player.z=nz;

}else{

    if(!checkCollision(nx,player.z))
        player.x=nx;

    if(!checkCollision(player.x,nz))
        player.z=nz;

}

}

if(input.left){
    player.rot -= 0.05;
}

if(input.right){
    player.rot += 0.05;
}

if(player.attackCd>0) player.attackCd--;

if(player.dodgeCd>0) player.dodgeCd--;

if(player.skillCd>0) player.skillCd--;

for(const e of enemies){

    if(e.blindTimer>0){

        e.blindTimer--;

        if(e.blindTimer<=0){
            e.vision=14;
        }

    }

}

if(boss){

    if(boss.blindTimer>0){

        boss.blindTimer--;

        if(boss.blindTimer<=0){
            boss.vision=22; // hoặc tầm nhìn mặc định của boss
        }

    }

}

    // Update
    updateParty();
    updateEnemies();
    updateBoss();
updateMasterDaun();
updatePartyCombat();
damageParty();
    updateEffects();
    updateArea();
    masterBlessing();

if(
!secretBoss &&
player.z>25 &&
Math.abs(player.x)<10
){
    spawnSecretBoss();
}

updateSecretBoss();
updateStaffProjectiles();

let sx = 0;
let sy = 0;

if(screenShake > 0){

    sx = (Math.random()-0.5) * screenShake;
    sy = (Math.random()-0.5) * screenShake;

    screenShake *= 0.9;

    if(screenShake < 0.01)
        screenShake = 0;
}

camera.position.set(
    player.x + sx,
    player.y + sy,
    player.z
);

    camera.lookAt(
        player.x + Math.sin(player.rot),
        player.y,
        player.z - Math.cos(player.rot)
    );

if(player.overHp > 0){

hpDiv.innerText =
"HP: "+
player.hp+
" +"+
player.overHp+
" / "+
player.maxHp;

}else{

hpDiv.innerText =
"HP: "+
player.hp+
" / "+
player.maxHp;

}

    partyDiv.innerText =
        "Party: " +
        party.filter(p=>p.alive).length;

    // Draw
    renderer.render(scene,camera);

    requestAnimationFrame(gameLoop);

}

buildForestEntrance();
buildDeadForest();
buildShrine();
buildStatueArea();
gameLoop();

</script>
